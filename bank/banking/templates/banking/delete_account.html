{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delete Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'banking/css/style.css' %}" rel="stylesheet">
</head>

<body>

<div class="container page-shell" style="max-width: 540px;">
    <div class="card danger-zone text-center">

        <div class="card-body">
            <div class="mb-3 fs-1">⚠️</div>

            <h5 class="fw-bold mb-3">
                Supprimer ce compte ?
            </h5>

            <p class="text-muted">
                Compte :
                <strong>{{ account.account_number }}</strong><br>
                Cette action est <span class="text-danger fw-bold">irréversible</span>.
            </p>

            <form method="post" class="mt-4">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="/" class="btn btn-outline-secondary px-4">
                         Annuler
                    </a>
                    <button class="btn btn-danger px-4">
                         Supprimer
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>

</body>
</html>
