{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'banking/css/style.css' %}" rel="stylesheet">
</head>

<body>

<div class="container page-shell" style="max-width: 680px;">
    <section class="page-header">
        <div>
            <div class="eyebrow">Administration</div>
            <h1 class="hero-title">Modifier le compte</h1>
            <p class="hero-subtitle mb-0">Mettez à jour les informations du compte bancaire.</p>
        </div>
    </section>
    <div class="card">
        <div class="card-header bg-transparent fw-bold">Informations du compte</div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="d-flex justify-content-between mt-4">
                    <a href="/" class="btn btn-outline-secondary px-4">
                         Annuler
                    </a>
                    <button class="btn btn-primary px-4">
                         Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
