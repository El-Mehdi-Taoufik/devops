{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ajouter un client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'banking/css/style.css' %}" rel="stylesheet">
</head>

<body>

<div class="container page-shell" style="max-width: 540px;">
    <section class="page-header">
        <div>
            <div class="eyebrow">Administration</div>
            <h1 class="hero-title">Ajouter un client</h1>
            <p class="hero-subtitle mb-0">Créez un profil client avec ses informations de contact.</p>
        </div>
    </section>
    <div class="card">
        <div class="card-header bg-transparent fw-bold">Nouveau client</div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Téléphone</label>
                    {{ form.phone }}
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/" class="btn btn-outline-secondary px-4">Annuler</a>
                    <button class="btn btn-success px-4">Créer client</button>
                </div>
            </form>

        </div>
    </div>
</div>

</body>
</html>
