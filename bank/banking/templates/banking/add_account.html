{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ajouter un compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'banking/css/style.css' %}" rel="stylesheet">
</head>
<body>

<div class="container page-shell" style="max-width: 680px;">
    <section class="page-header">
        <div>
            <div class="eyebrow">Administration</div>
            <h1 class="hero-title">Ajouter un compte</h1>
            <p class="hero-subtitle mb-0">Créez un nouveau compte bancaire pour un client existant.</p>
        </div>
    </section>
    <div class="card">
        <div class="card-header bg-transparent d-flex justify-content-between align-items-center fw-bold">
            Nouveau compte
            <a href="{% url 'add_client' %}" class="btn btn-sm btn-outline-primary">Ajouter un client</a>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-between mt-4">
                    <a href="/" class="btn btn-outline-secondary px-4">Annuler</a>
                    <button class="btn btn-success px-4">Créer</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
