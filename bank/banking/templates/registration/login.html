{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | BankApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'banking/css/style.css' %}" rel="stylesheet">
</head>
<body class="auth-page">

<div class="card auth-card">
    <div class="auth-header">
        <h3>🏦 BankApp</h3>
        <small>Connexion sécurisée</small>
    </div>

    <div class="card-body p-4">

        {% if form.errors %}
            <div class="alert alert-danger">
                Nom d'utilisateur ou mot de passe incorrect ❌
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="Entrer votre username" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary text-white w-100 py-2">
                🔐 Se connecter
            </button>
            <p class="text-center mt-3 mb-0">
                Vous n’avez pas de compte ?
                <a href="{% url 'register' %}" class="fw-bold">Créer un compte</a>
            </p>
        </form>
    </div>
</div>

</body>
</html>
